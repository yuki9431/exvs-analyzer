name: Infra CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**"

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Check required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.PULUMI_STATE_BUCKET }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::PULUMI_STATE_BUCKET is not set. Skipping preview."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.check-secrets.outputs.skip != 'true'

      - uses: actions/setup-node@v6
        if: steps.check-secrets.outputs.skip != 'true'
        with:
          node-version: "22"

      - id: auth
        if: steps.check-secrets.outputs.skip != 'true'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Install shared dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: infra/shared
        run: npm ci

      - name: Install app dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: infra/app
        run: npm ci

      - name: Pulumi preview (shared)
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: infra/shared
        run: |
          npm install -g @pulumi/pulumi 2>/dev/null || true
          pulumi login gs://${{ secrets.PULUMI_STATE_BUCKET }}
          if ! pulumi stack select shared 2>/dev/null; then
            echo "### shared: stack not initialized, skipping" > /tmp/pulumi-preview.txt
            exit 0
          fi
          echo "### shared" > /tmp/pulumi-preview.txt
          pulumi preview 2>&1 | tee -a /tmp/pulumi-preview.txt
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Pulumi preview (app/prod)
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: infra/app
        run: |
          pulumi login gs://${{ secrets.PULUMI_STATE_BUCKET }}
          if ! pulumi stack select prod 2>/dev/null; then
            echo "### app (prod): stack not initialized, skipping" >> /tmp/pulumi-preview.txt
            exit 0
          fi
          echo "### app (prod)" >> /tmp/pulumi-preview.txt
          pulumi preview 2>&1 | tee -a /tmp/pulumi-preview.txt
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Pulumi preview (app/staging)
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: infra/app
        run: |
          if ! pulumi stack select staging 2>/dev/null; then
            echo "### app (staging): stack not initialized, skipping" >> /tmp/pulumi-preview.txt
            exit 0
          fi
          echo "### app (staging)" >> /tmp/pulumi-preview.txt
          pulumi preview 2>&1 | tee -a /tmp/pulumi-preview.txt
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      - name: Comment preview on PR
        if: steps.check-secrets.outputs.skip != 'true' && always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIEW=$(cat /tmp/pulumi-preview.txt 2>/dev/null || echo "Preview output not available")
          gh pr comment "${{ github.event.pull_request.number }}" --body "## Pulumi Preview
          \`\`\`
          ${PREVIEW}
          \`\`\`"
