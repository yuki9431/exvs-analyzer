name: CD

on:
  push:
    branches: [main]

jobs:
  check-deploy-label:
    runs-on: ubuntu-latest
    outputs:
      no-deploy: ${{ steps.check.outputs.no-deploy }}
    steps:
      - name: Check merged PR labels
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # マージコミットに関連するPRを取得
          PR_NUMBER=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$PR_NUMBER" ]; then
            echo "no-deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh api \
            "repos/${{ github.repository }}/pulls/${PR_NUMBER}/labels" \
            --jq '.[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q "^no-deploy$"; then
            echo "no-deploy=true" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: no-deploy label found on PR #${PR_NUMBER}"
          else
            echo "no-deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: check-deploy-label
    if: needs.check-deploy-label.outputs.no-deploy != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image
        run: gcloud builds submit --tag ${{ secrets.GCR_IMAGE }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy exvs-analyzer \
            --image ${{ secrets.GCR_IMAGE }} \
            --region asia-northeast1 \
            --set-env-vars "GCS_BUCKET=${{ secrets.GCS_BUCKET }}" \
            --max-instances 3 \
            --concurrency 10 \
            --allow-unauthenticated
