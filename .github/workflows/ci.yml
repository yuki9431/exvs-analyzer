name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker Build
        run: docker build -t exvs-analyzer .

  lint-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Go vet
        run: go vet ./...

      - name: Go build check
        run: go build ./cmd/server

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: python -m py_compile scripts/analyze.py
