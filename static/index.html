<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EXVS2IB 戦績分析</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #4fc3f7; margin: 40px 0 10px; font-size: 1.8em; }
    .subtitle { text-align: center; color: #888; margin-bottom: 40px; }
    .login-form { background: #1a2633; border-radius: 12px; padding: 30px; margin-bottom: 30px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.9em; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px;
      background: #0f1923; color: #e0e0e0; font-size: 1em;
    }
    input:focus { outline: none; border-color: #4fc3f7; }
    button {
      width: 100%; padding: 14px; border: none; border-radius: 8px;
      background: #4fc3f7; color: #0f1923; font-size: 1.1em; font-weight: bold;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #81d4fa; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .security-note { margin: 16px 0; padding: 12px; font-size: 0.8em; color: #aaa; line-height: 1.6; background: #162029; border-radius: 8px; border-left: 3px solid #4fc3f7; }
    .note { margin-top: 16px; font-size: 0.8em; color: #777; line-height: 1.6; }
    .status { text-align: center; margin: 20px 0; color: #aaa; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #333; border-top: 3px solid #4fc3f7; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .report { background: #1a2633; border-radius: 12px; padding: 30px; line-height: 1.8; }
    .report h1 { font-size: 1.5em; margin: 20px 0 10px; text-align: left; }
    .report h2 { font-size: 1.3em; color: #4fc3f7; margin: 25px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
    .report h3 { font-size: 1.1em; color: #81d4fa; margin: 20px 0 8px; }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .report table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.9em; white-space: nowrap; }
    .report th, .report td { padding: 8px 12px; border: 1px solid #333; text-align: left; }
    .report th { background: #1e3a4f; color: #4fc3f7; }
    .report tr:nth-child(even) { background: #162029; }
    .report blockquote { border-left: 3px solid #4fc3f7; padding: 10px 15px; margin: 10px 0; background: #162029; border-radius: 0 8px 8px 0; }
    .report hr { border: none; border-top: 1px solid #333; margin: 20px 0; }
    .report ul, .report ol { padding-left: 20px; }
    .report strong { color: #4fc3f7; }
    .report a { color: #4fc3f7; text-decoration: none; }
    .report a:hover { text-decoration: underline; }
    .report details { margin-bottom: 20px; }
    .report summary { cursor: pointer; font-weight: bold; color: #4fc3f7; }
    .error { background: #3d1f1f; border: 1px solid #ff5252; border-radius: 8px; padding: 15px; color: #ff8a80; margin: 20px 0; }
    @media (max-width: 600px) {
      .container { padding: 10px; }
      h1 { font-size: 1.4em; margin: 20px 0 8px; }
      .subtitle { margin-bottom: 20px; }
      .login-form { padding: 20px; }
      .report { padding: 15px; line-height: 1.6; }
      .report h1 { font-size: 1.2em; }
      .report h2 { font-size: 1.1em; }
      .report h3 { font-size: 1em; }
      .report table { font-size: 0.8em; }
      .report th, .report td { padding: 5px 8px; }
      .report blockquote { padding: 8px 10px; font-size: 0.85em; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>EXVS2IB 戦績分析</h1>
    <p class="subtitle">バンダイナムコIDでログインして戦績を分析</p>

    <div class="login-form" id="loginForm">
      <div class="form-group">
        <label for="username">バンダイナムコID (メールアドレス)</label>
        <input type="text" id="username" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" placeholder="パスワード">
      </div>
      <p class="security-note">パスワードはバンダイナムコの公式サイトへのログインにのみ使用し、サーバーには保存しません。通信はHTTPSで暗号化されています。</p>
      <button id="analyzeBtn">分析開始</button>
      <p class="note">公式サイトから直近30日分の戦績を取得して分析します。初回は全データを取得するため5〜10分ほどかかりますが、2回目以降は前回からの差分のみ取得するため短時間で完了します。</p>
    </div>

    <div class="status" id="status" style="display:none;">
      <span class="spinner"></span>
      <span id="statusText">準備中...</span>
    </div>

    <div class="error" id="error" style="display:none;"></div>
    <div class="report" id="report" style="display:none;"></div>
  </div>

  <script src="marked.min.js"></script>
  <script src="purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
